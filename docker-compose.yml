services:
  orders-db:
    image: postgres:16
    container_name: orders-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ordersdb
      POSTGRES_USER: mengzhou
      POSTGRES_PASSWORD: password123
    ports:
      - "5433:5432"
    volumes:
      - orders_db_data:/var/lib/postgresql/data
    networks:
      - backend

  inventory-db:
    image: postgres:16
    container_name: inventory-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: inventory
      POSTGRES_USER: mengzhou
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"
    volumes:
      - inventory_db_data:/var/lib/postgresql/data
    networks:
      - backend

  kafka:
    image: apache/kafka:latest
    container_name: kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    networks:
      - backend

  orders-service:
    build: ./orders-service
    container_name: orders-service
    restart: unless-stopped
    depends_on:
      - orders-db
      - kafka
    environment:
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:postgresql://orders-db:5432/ordersdb
      SPRING_DATASOURCE_USERNAME: mengzhou
      SPRING_DATASOURCE_PASSWORD: password123
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8081:8081"
    networks:
      - backend

  inventory-service:
    build: ./inventory-service
    container_name: inventory-service
    restart: unless-stopped
    depends_on:
      - inventory-db
    environment:
      SERVER_PORT: 8082
      SPRING_DATASOURCE_URL: jdbc:postgresql://inventory-db:5432/inventory
      SPRING_DATASOURCE_USERNAME: mengzhou
      SPRING_DATASOURCE_PASSWORD: password123
    ports:
      - "8082:8082"
    networks:
      - backend

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    restart: unless-stopped
    depends_on:
      - orders-service
      - inventory-service
    environment:
      SERVER_PORT: 8080
      ORDERS_SERVICE_URI: http://orders-service:8081
      INVENTORY_SERVICE_URI: http://inventory-service:8082
    ports:
      - "8080:8080"
    networks:
      - backend

networks:
  backend:

volumes:
  orders_db_data:
  inventory_db_data:
