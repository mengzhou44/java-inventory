spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: orders
              uri: ${ORDERS_SERVICE_URI:http://localhost:8081}
              predicates:
                - Path=/api/orders/**
            - id: inventory
              uri: ${INVENTORY_SERVICE_URI:http://localhost:8082}
              predicates:
                - Path=/api/inventory/**

server:
  error:
    include-message: always
