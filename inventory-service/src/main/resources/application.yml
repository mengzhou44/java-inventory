spring:
  application:
    name: backend

  # Show exception message on error page (helpful for debugging)
  mvc:
    log-resolved-exception: true

  datasource:
    # Default local Postgres connection (overridden in Docker by SPRING_DATASOURCE_URL)
    url: jdbc:postgresql://localhost:5432/inventory
    username: mengzhou
    password: password123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8082
  error:
    include-message: always

