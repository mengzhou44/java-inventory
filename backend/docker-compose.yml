version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: inventory-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mengzhou
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: inventory
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mengzhou -d inventory"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

